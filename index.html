<div class="image-resizer-container">
    
    <div class="resizer-logo-wrap">
        <img src="logo.png" class="resizer-logo" alt="Логотип">
    </div>

    <h2 class="resizer-title">Оптимизатор картинок</h2>
    
    <label class="upload-box" id="dropZone">
        <span id="uploadText">📁 Нажмите или перетащите сюда картинки</span>
        <input type="file" id="fileInput" multiple accept="image/*">
    </label>

    <div class="resizer-settings">
        <div class="setting-row">
            <label>Макс. сторона (px):</label>
            <input type="number" id="maxSize" value="1200" min="100" max="5000">
        </div>
        <div class="setting-row">
            <label>Формат вывода:</label>
            <select id="format">
                <option value="image/webp">WebP (лучшее сжатие)</option>
                <option value="image/jpeg">JPEG</option>
                <option value="image/png">PNG</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Качество (0.1 - 1.0):</label>
            <input type="number" id="quality" value="0.8" step="0.1" min="0.1" max="1.0">
        </div>
    </div>

    <button id="processBtn" disabled>Сжать и конвертировать</button>
    
    <div id="resizerStatus">Файлы не выбраны</div>
    <div id="downloadLinks"></div>
</div>

<style>
    /* Основной контейнер в стиле темного неона */
    .image-resizer-container { 
        max-width: 600px; 
        margin: 30px auto; 
        background: #0d1117; 
        padding: 30px; 
        border-radius: 16px; 
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), 0 0 40px rgba(127, 0, 255, 0.1); 
        border: 1px solid #1f2937;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
        color: #e2e8f0; 
    }
    
    /* Стили для логотипа */
    .resizer-logo-wrap {
        text-align: center;
        margin-bottom: 15px;
    }
    .resizer-logo {
        max-height: 60px; /* Максимальная высота логотипа */
        width: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.5)); /* Неоновый отсвет от логотипа */
    }

    /* Заголовок с градиентом и свечением */
    .resizer-title { 
        text-align: center; 
        background: linear-gradient(45deg, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-top: 0; 
        margin-bottom: 25px; 
        font-size: 26px; 
        font-weight: bold; 
        text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    /* Зона загрузки файлов с неоновым контуром */
    .upload-box { 
        display: block; 
        border: 2px dashed #00f2fe; 
        padding: 35px; 
        text-align: center; 
        border-radius: 10px; 
        background: #161b22; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.05);
    }
    .upload-box:hover { 
        background: #1c212c; 
        border-color: #7f00ff;
        box-shadow: 0 0 15px rgba(127, 0, 255, 0.4), inset 0 0 15px rgba(127, 0, 255, 0.1);
    }
    .upload-box input[type="file"] { display: none; }
    .upload-box span { color: #8b949e; font-size: 15px; }

    /* Блок настроек */
    .resizer-settings { 
        margin: 25px 0; 
        background: #161b22; 
        padding: 18px; 
        border-radius: 10px; 
        border: 1px solid #21262d;
    }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-row label { font-weight: 600; font-size: 14px; color: #c9d1d9; }
    
    /* Поля ввода и выпадающие списки */
    .setting-row input[type="number"], .setting-row select { 
        padding: 8px; 
        border: 1px solid #30363d; 
        border-radius: 6px; 
        width: 110px; 
        box-sizing: border-box; 
        background: #0d1117;
        color: #f0f6fc;
        outline: none;
        transition: border-color 0.2s;
    }
    .setting-row input[type="number"]:focus, .setting-row select:focus {
        border-color: #00f2fe;
    }

    /* Кнопка запуска с неоновым пульсирующим эффектом */
    #processBtn { 
        width: 100%; 
        padding: 14px; 
        background: linear-gradient(45deg, #7f00ff, #ff007f); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        font-size: 16px; 
        font-weight: bold; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        box-shadow: 0 0 10px rgba(127, 0, 255, 0.3);
    }
    #processBtn:hover:not(:disabled) { 
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        transform: translateY(-1px);
    }
    #processBtn:disabled { 
        background: #21262d; 
        color: #8b949e;
        border: 1px solid #30363d;
        box-shadow: none;
        cursor: not-allowed; 
    }

    /* Статус-бар */
    #resizerStatus { margin-top: 18px; text-align: center; font-weight: 500; color: #8b949e; font-size: 14px; }
    
    /* Ссылки на скачивание */
    #downloadLinks { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
    .download-btn { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        background: #1f2937; 
        padding: 12px 16px; 
        border-radius: 8px; 
        text-decoration: none; 
        color: #00f2fe; 
        font-size: 14px; 
        border: 1px solid #30363d; 
        transition: all 0.2s ease; 
    }
    .download-btn:hover { 
        background: #283548; 
        border-color: #00f2fe;
        color: #00f2fe;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        text-decoration: none;
    }
    .download-btn strong { color: #ff007f; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;}
</style>

<script>
(function() {
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const uploadText = document.getElementById('uploadText');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('resizerStatus');
    const downloadLinks = document.getElementById('downloadLinks');

    let selectedFiles = [];

    fileInput.addEventListener('change', handleFiles);
    
    function handleFiles(e) {
        selectedFiles = Array.from(e.target.files || e.dataTransfer.files);
        if (selectedFiles.length > 0) {
            uploadText.innerText = `Выбрано файлов: ${selectedFiles.length}`;
            status.innerText = `Готово к обработке`;
            processBtn.disabled = false;
            downloadLinks.innerHTML = '';
        }
    }

    ['dragenter', 'dragover'].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.style.borderColor = '#7f00ff'; }, false);
    });
    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.style.borderColor = '#00f2fe'; }, false);
    });
    dropZone.addEventListener('drop', handleFiles);

    processBtn.addEventListener('click', async () => {
        processBtn.disabled = true;
        status.innerText = 'Обработка...';
        downloadLinks.innerHTML = '';

        const maxSize = parseInt(document.getElementById('maxSize').value);
        const format = document.getElementById('format').value;
        const quality = parseFloat(document.getElementById('quality').value);
        const ext = format.split('/')[1];

        for (let file of selectedFiles) {
            try {
                const bitmap = await createImageBitmap(file);
                let width = bitmap.width;
                let height = bitmap.height;

                if (width > maxSize || height > maxSize) {
                    if (width > height) {
                        height = Math.round((height * maxSize) / width);
                        width = maxSize;
                    } else {
                        width = Math.round((width * maxSize) / height);
                        height = maxSize;
                    }
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0, width, height);

                const blob = await new Promise(resolve => canvas.toBlob(resolve, format, quality));
                const url = URL.createObjectURL(blob);

                const originalName = file.name.substring(0, file.name.lastIndexOf('.'));
                const a = document.createElement('a');
                a.href = url;
                a.download = `${originalName}_resized.${ext}`;
                a.className = 'download-btn';
                a.innerHTML = `<span>💾 ${a.download}</span> <strong>Скачать</strong>`;
                downloadLinks.appendChild(a);

            } catch (err) {
                console.error(err);
                status.innerText = 'Ошибка при обработке файлов.';
            }
        }
        status.innerText = 'Все файлы успешно обработаны!';
        processBtn.disabled = false;
    });
})();
</script>
